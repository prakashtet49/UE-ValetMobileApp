# Staging CI/CD: On push of tag "staging", "staging-patch", "staging-minor", "staging-major"
# -> build Android release from the tagged commit (any branch), deploy to Firebase App Distribution
# Version is taken from the branch (no bump script required).
name: Staging Build and Deploy

on:
  push:
    tags:
      - staging
      - 'staging-patch'
      - 'staging-minor'
      - 'staging-major'

env:
  FIREBASE_APP_ID_ANDROID: '1:556469915246:android:7173377775e57f9bc1a07f'
  NODE_VERSION: '20'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build Android Release APK
        run: |
          cd android
          ./gradlew assembleRelease \
            -PMYAPP_RELEASE_STORE_FILE=debug.keystore \
            -PMYAPP_RELEASE_STORE_PASSWORD=android \
            -PMYAPP_RELEASE_KEY_ALIAS=androiddebugkey \
            -PMYAPP_RELEASE_KEY_PASSWORD=android
          cd ..

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase App Distribution
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          if [ -z "$FIREBASE_TOKEN" ]; then
            echo "::error::FIREBASE_TOKEN secret is not set. Add it in repo Settings → Secrets and variables → Actions. Generate with: firebase login:ci"
            exit 1
          fi
          VERSION=$(node -p "require('./app.json').version")
          firebase appdistribution:distribute \
            android/app/build/outputs/apk/release/app-release.apk \
            --app ${{ env.FIREBASE_APP_ID_ANDROID }} \
            --groups "internal-testers" \
            --release-notes "Staging build v${VERSION} - $(date -u +%Y-%m-%dT%H:%MZ)"
